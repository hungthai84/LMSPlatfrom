<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google AI Studio</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/GvcmMgD3/Logo-Tr-ng.png" />
  </head>
  <body>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // by intercepting assignments to window.fetch
      const originalFetch = window.fetch;
      Object.defineProperty(window, 'fetch', {
        configurable: true,
        enumerable: true,
        get: () => originalFetch,
        set: (val) => {
          // ignore polyfill assignments
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
